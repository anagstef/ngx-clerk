name: Publish Canary

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

concurrency:
  group: canary-publish
  cancel-in-progress: true

jobs:
  canary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Set canary version
        run: |
          BASE_VERSION=$(node -p "require('./projects/ngx-clerk/package.json').version")
          SHORT_SHA=$(git rev-parse --short HEAD)
          CANARY_VERSION="${BASE_VERSION}-canary.${SHORT_SHA}"
          echo "Publishing ${CANARY_VERSION}"
          cd dist/ngx-clerk
          pnpm version "${CANARY_VERSION}" --no-git-tag-version

      - name: Publish canary
        run: pnpm publish --tag canary --no-git-checks
        working-directory: dist/ngx-clerk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
